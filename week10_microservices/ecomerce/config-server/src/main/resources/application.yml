spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Venu99129/spring-config-server
          username: ${GITHUB_USERNAME}
          password: ${GITHUB_TOKEN}
          default-label: main
server:
  port: 8888

#eureka config
eureka:
  client:
    server-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true